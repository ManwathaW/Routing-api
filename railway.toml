[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = ""
restartPolicyType = "on_failure"
# Intentionally NO healthcheckPath. The previous working deploy had none, and
# adding /ors/v2/health caused every redeploy to fail: ORS returns 503 on that
# endpoint while it does CH/LM preprocessing in the background after profile
# load, which can take much longer than any reasonable healthcheck window.
# Without an HTTP healthcheck, Railway marks the deploy ACTIVE as soon as the
# container is up; ORS finishes preprocessing on its own time and starts
# serving routes when ready.

[env]
PORT = "8082"
# XMX=400m OOMs during PBF graph build (visible in deploy logs as
# OutOfMemoryError mid-build). 1g gives the build room to complete; the
# Railway project is on a usage-based plan with enough container memory
# to hold a 1 GB heap plus JVM overhead.
XMS = "256m"
XMX = "1g"
CONTAINER_LOG_LEVEL = "INFO"
