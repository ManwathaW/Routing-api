[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = ""
restartPolicyType = "on_failure"
healthcheckPath = "/ors/v2/health"
# ORS rebuilds graphs from the Limpopo PBF on every Railway deploy (~3-5 min).
# 600s gives generous buffer; the previous 300s was right at the edge.
healthcheckTimeout = 600

[env]
PORT = "8082"
# These override the Dockerfile ENV values. The working production deploy
# ran with XMS=200m / XMX=400m — anything larger gets the JVM OOM-killed by
# the container even when "heap Used" shows headroom (native + metaspace +
# GC overhead push real RSS past the container limit). Don't raise these
# without upgrading the Railway plan.
XMS = "200m"
XMX = "400m"
CONTAINER_LOG_LEVEL = "INFO"
