[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = ""
restartPolicyType = "on_failure"
healthcheckPath = "/ors/v2/health"
# First-time graph build + CH/LM preprocessing for the Limpopo extract can
# take well over 5 minutes. 1800s (30 min) is generous; once the volume has
# warm graphs, subsequent restarts only need to load (a few seconds) and the
# timeout is irrelevant.
healthcheckTimeout = 1800

[env]
PORT = "8082"
# XMX=400m OOMs during PBF graph build (visible in deploy logs as
# OutOfMemoryError mid-build). 1g gives the build room to complete; the
# Railway project is on a usage-based plan with enough container memory
# to hold a 1 GB heap plus JVM overhead.
XMS = "256m"
XMX = "1g"
CONTAINER_LOG_LEVEL = "INFO"
