<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a73e8">
    <title>Limpopo Route Explorer</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #1a73e8;
            --primary-hover: #1557b0;
            --bg-color: #ffffff;
            --text-main: #202124;
            --text-muted: #5f6368;
            --border: #dadce0;
            --accent-green: #188038;
            --accent-red: #d93025;
            --shadow: 0 1px 2px rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
        }

        body {
            color: var(--text-main);
            overflow: hidden;
            display: flex;
            height: 100vh;
        }

        /* Side Panel */
        .sidebar {
            width: 360px;
            flex-shrink: 0;
            background: var(--bg-color);
            box-shadow: 2px 0 8px rgba(0,0,0,0.1);
            z-index: 1500;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: margin-left 0.3s ease, transform 0.3s ease;
        }

        /* Collapsed state on desktop: slide off-screen left */
        body[data-sidebar-open="false"] .sidebar {
            margin-left: -360px;
        }

        /* Chevron toggle attached to right edge of sidebar (desktop) */
        .sidebar-toggle {
            position: absolute;
            top: 84px;
            right: -16px;
            width: 32px;
            height: 56px;
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-left: none;
            border-radius: 0 12px 12px 0;
            cursor: pointer;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 2px 6px rgba(0,0,0,0.08);
            padding: 0;
        }

        .sidebar-toggle:hover { background: #f8f9fa; }

        .sidebar-toggle svg {
            width: 18px;
            height: 18px;
            fill: var(--text-muted);
            transition: transform 0.3s ease;
        }

        body[data-sidebar-open="false"] .sidebar-toggle svg {
            transform: rotate(180deg);
        }

        /* Floating menu button on the map — shown when sidebar is closed */
        .sidebar-open-btn {
            position: fixed;
            top: 16px;
            left: 16px;
            width: 48px;
            height: 48px;
            background: white;
            border: none;
            border-radius: 50%;
            box-shadow: var(--shadow);
            cursor: pointer;
            z-index: 1600;
            display: none;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .sidebar-open-btn:hover { transform: scale(1.05); }

        .sidebar-open-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--text-main);
        }

        body[data-sidebar-open="false"] .sidebar-open-btn { display: flex; }

        /* Backdrop for mobile when sidebar is open */
        .backdrop {
            display: none;
        }

        .header {
            padding: 24px 24px 16px;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 4px;
            color: var(--primary);
        }

        .subtitle {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .content {
            padding: 24px;
            flex-grow: 1;
            overflow-y: auto;
        }

        /* Server Status */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
            background: #f1f3f4;
            margin-bottom: 24px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--text-muted);
        }

        .status-dot.online { background-color: var(--accent-green); }
        .status-dot.offline { background-color: var(--accent-red); }

        /* Profile Selection */
        .profile-selector {
            display: flex;
            background: #f1f3f4;
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 24px;
        }

        .profile-btn {
            flex: 1;
            padding: 8px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.875rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .profile-btn.active {
            background: #fff;
            color: var(--primary);
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        /* Route Inputs */
        .input-group {
            position: relative;
            margin-bottom: 16px;
            padding-left: 28px;
        }

        .input-icon {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-start { border: 2px solid var(--primary); }
        .icon-end { background-color: var(--accent-red); }

        .input-line {
            position: absolute;
            left: 7px;
            top: 24px;
            bottom: -8px;
            width: 2px;
            background-color: var(--border);
            z-index: -1;
        }

        .location-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.875rem;
            color: var(--text-main);
            background: #f8f9fa;
        }

        .location-input:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
        }

        .location-input.active-step {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(26,115,232,0.2);
            background: #fff;
        }

        /* Buttons */
        .primary-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
        }

        .primary-btn:hover { background: var(--primary-hover); }

        .secondary-btn {
            width: 100%;
            padding: 10px;
            background: white;
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
        }

        .secondary-btn:hover { background: #f8f9fa; color: var(--text-main); }

        /* Route Stats */
        .route-stats {
            display: none;
            margin-top: 24px;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .stat-main {
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--accent-green);
            margin-bottom: 4px;
        }

        .stat-sub {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        /* Map Container */
        #map-container {
            flex-grow: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Floating Locate Button on Map */
        .locate-control {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 1000;
            background: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
            border: none;
        }

        .locate-control:hover {
            transform: scale(1.05);
            background: #f8f9fa;
        }

        .locate-control svg {
            width: 24px;
            height: 24px;
            fill: var(--text-muted);
            transition: fill 0.2s;
        }

        .locate-control.active svg { fill: var(--primary); }
        .locate-control.loading svg { animation: spin 1s linear infinite; }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* User Location Marker */
        .user-location-marker {
            width: 16px;
            height: 16px;
            background: var(--primary);
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(26,115,232,0.5);
        }

        .pulse-ring {
            content: '';
            width: 32px;
            height: 32px;
            background: rgba(26,115,232,0.3);
            border-radius: 50%;
            position: absolute;
            top: -8px;
            left: -8px;
            animation: pulsate 2s ease-out infinite;
            z-index: -1;
        }

        @keyframes pulsate {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* ---------- Mobile ---------- */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                width: min(360px, 88vw);
                height: 100dvh;
                /* Override desktop's margin-based collapse; use transform on mobile */
                margin-left: 0 !important;
                transition: transform 0.3s ease;
            }

            body[data-sidebar-open="false"] .sidebar {
                transform: translateX(-100%);
            }

            /* Hide the edge chevron on mobile — close via backdrop tap or back button */
            .sidebar-toggle {
                display: none;
            }

            /* Add a close button inside the header on mobile */
            .header {
                padding: 16px 16px 12px;
                display: flex;
                align-items: flex-start;
                justify-content: space-between;
                gap: 12px;
            }

            .header-text { flex: 1; min-width: 0; }

            .sidebar-close-btn {
                display: flex;
                align-items: center;
                justify-content: center;
                background: transparent;
                border: none;
                width: 36px;
                height: 36px;
                border-radius: 50%;
                cursor: pointer;
                color: var(--text-muted);
                flex-shrink: 0;
            }

            .sidebar-close-btn:hover { background: #f1f3f4; }

            .sidebar-close-btn svg { width: 20px; height: 20px; fill: currentColor; }

            h1 { font-size: 1.25rem; }
            .subtitle { font-size: 0.8125rem; }
            .content { padding: 16px; }

            /* Backdrop only relevant on mobile */
            .backdrop {
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.45);
                z-index: 1400;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.3s ease;
            }

            body[data-sidebar-open="true"] .backdrop {
                display: block;
                opacity: 1;
                pointer-events: auto;
            }

            /* Make floating buttons safe from notches */
            .sidebar-open-btn {
                top: max(16px, env(safe-area-inset-top));
                left: max(16px, env(safe-area-inset-left));
            }

            .locate-control {
                bottom: max(20px, env(safe-area-inset-bottom));
                right: max(16px, env(safe-area-inset-right));
            }
        }

        /* Hide mobile-only close button on desktop */
        @media (min-width: 769px) {
            .sidebar-close-btn { display: none; }
        }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <button class="sidebar-toggle" id="sidebarToggle" type="button" aria-label="Hide panel" title="Hide panel">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/></svg>
        </button>
        <div class="header">
            <div class="header-text">
                <h1>Limpopo Maps</h1>
                <p class="subtitle">Local OpenRouteService Instance</p>
            </div>
            <button class="sidebar-close-btn" id="sidebarCloseBtn" type="button" aria-label="Close panel">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
        </div>
        
        <div class="content">
            <div class="status-badge">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Checking server...</span>
            </div>

            <div class="profile-selector">
                <button class="profile-btn active" data-profile="driving-car">Driving</button>
                <button class="profile-btn" data-profile="foot-walking">Walking</button>
            </div>

            <div style="position: relative;">
                <div class="input-line"></div>
                
                <div class="input-group">
                    <div class="input-icon icon-start"></div>
                    <input type="text" class="location-input active-step" id="startInput" placeholder="Click map to set start point..." readonly>
                </div>
                
                <div class="input-group">
                    <div class="input-icon icon-end"></div>
                    <input type="text" class="location-input" id="endInput" placeholder="Click map to set destination..." readonly>
                </div>
            </div>

            <button class="primary-btn" id="btnLocateMe">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
                Use My Current Location
            </button>

            <button class="secondary-btn" id="btnReset" onclick="resetMap()">Reset All</button>

            <div class="route-stats" id="routeStats">
                <div class="stat-main" id="timeValue">--</div>
                <div class="stat-sub" id="distValue">--</div>
            </div>
        </div>
    </aside>

    <div class="backdrop" id="backdrop"></div>

    <div id="map-container">
        <div id="map"></div>
        <button class="sidebar-open-btn" id="sidebarOpenBtn" type="button" aria-label="Open panel" title="Open panel">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
        </button>
        <button class="locate-control" id="mapLocateBtn" title="Find my location">
            <svg viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
        </button>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // ---------- Sidebar toggle (responsive) ----------
        const MOBILE_BREAKPOINT = 768;
        const sidebar = document.getElementById('sidebar');
        const backdrop = document.getElementById('backdrop');

        function isMobile() {
            return window.matchMedia(`(max-width: ${MOBILE_BREAKPOINT}px)`).matches;
        }

        function setSidebarOpen(open) {
            document.body.dataset.sidebarOpen = open ? 'true' : 'false';
            // Leaflet needs a nudge so the map fills its new size after the
            // sidebar slides in/out. Wait for the CSS transition (300ms).
            setTimeout(() => map && map.invalidateSize(), 320);
        }

        // Initial state: open on desktop, closed on mobile
        setSidebarOpen(!isMobile());

        document.getElementById('sidebarToggle').addEventListener('click', () => {
            setSidebarOpen(document.body.dataset.sidebarOpen !== 'true');
        });
        document.getElementById('sidebarOpenBtn').addEventListener('click', () => setSidebarOpen(true));
        document.getElementById('sidebarCloseBtn').addEventListener('click', () => setSidebarOpen(false));
        backdrop.addEventListener('click', () => setSidebarOpen(false));

        // Re-evaluate default when crossing the breakpoint (e.g. orientation change)
        let wasMobile = isMobile();
        window.addEventListener('resize', () => {
            const nowMobile = isMobile();
            if (nowMobile !== wasMobile) {
                setSidebarOpen(!nowMobile);
                wasMobile = nowMobile;
            }
        });

        // Limpopo center coordinates (Polokwane)
        const map = L.map('map').setView([-23.9045, 29.4689], 8);

        // Base Layers
        const osmStreets = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 19
        });

        const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community',
            maxZoom: 19
        });

        const cartoLight = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        });

        const baseMaps = {
            "Streets": osmStreets,
            "Satellite": satellite,
            "Light/Minimal": cartoLight
        };

        // Set default layer
        osmStreets.addTo(map);
        
        // Add layer control
        L.control.layers(baseMaps, null, {position: 'topright'}).addTo(map);

        let startMarker = null;
        let endMarker = null;
        let userMarker = null;
        let routeLayer = null;
        let currentProfile = 'driving-car';
        let currentStep = 'start'; // 'start' or 'end'

        // --- API CONFIGURATION ---
        // Resolution order:
        //   1. ?api=<url> query parameter (e.g. ?api=http://localhost:8080/ors/v2)
        //   2. window.ORS_BASE_URL (set inline via a <script> if hosting yourself)
        //   3. Production Railway backend (default)
        //   4. http://localhost:8080/ors/v2 when running from file:// or localhost
        const PROD_API = 'https://routing-api-production-e9c5.up.railway.app/ors/v2';
        const LOCAL_API = 'http://localhost:8080/ors/v2';
        const queryApi = new URLSearchParams(window.location.search).get('api');
        const isLocalHost = ['localhost', '127.0.0.1', ''].includes(window.location.hostname);
        const ORS_BASE_URL = queryApi || window.ORS_BASE_URL || (isLocalHost ? LOCAL_API : PROD_API);
        const startInput = document.getElementById('startInput');
        const endInput = document.getElementById('endInput');

        // Check Server Status
        async function checkServer() {
            try {
                const response = await fetch(`${ORS_BASE_URL}/health`);
                const data = await response.json();
                if (data.status === 'ready') {
                    document.getElementById('statusText').innerText = 'API Connected';
                    document.getElementById('statusDot').className = 'status-dot online';
                }
            } catch (err) {
                document.getElementById('statusText').innerText = 'API Offline';
                document.getElementById('statusDot').className = 'status-dot offline';
            }
        }

        checkServer();

        // Profile Selection
        document.querySelectorAll('.profile-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.profile-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentProfile = e.target.getAttribute('data-profile');
                if (startMarker && endMarker) {
                    calculateRoute();
                }
            });
        });

        // Custom Icons
        const startIcon = L.divIcon({
            html: '<div style="width: 16px; height: 16px; background: white; border: 3px solid #1a73e8; border-radius: 50%;"></div>',
            className: '',
            iconSize: [16, 16],
            iconAnchor: [8, 8]
        });

        const endIcon = L.divIcon({
            html: '<div style="width: 16px; height: 16px; background: #d93025; border-radius: 50%;"></div>',
            className: '',
            iconSize: [16, 16],
            iconAnchor: [8, 8]
        });

        const userLocationIcon = L.divIcon({
            html: '<div class="user-location-marker"><div class="pulse-ring"></div></div>',
            className: '',
            iconSize: [16, 16],
            iconAnchor: [8, 8]
        });

        // Map Click Handler
        map.on('click', function(e) {
            const latlng = e.latlng;

            if (currentStep === 'start') {
                if (startMarker) map.removeLayer(startMarker);
                startMarker = L.marker(latlng, { icon: startIcon, title: "Start" }).addTo(map);
                startInput.value = `${latlng.lat.toFixed(5)}, ${latlng.lng.toFixed(5)}`;
                
                // Move to next step
                currentStep = 'end';
                startInput.classList.remove('active-step');
                endInput.classList.add('active-step');
                
                if (endMarker) calculateRoute();
            } else if (currentStep === 'end') {
                if (endMarker) map.removeLayer(endMarker);
                endMarker = L.marker(latlng, { icon: endIcon, title: "End" }).addTo(map);
                endInput.value = `${latlng.lat.toFixed(5)}, ${latlng.lng.toFixed(5)}`;
                
                endInput.classList.remove('active-step');
                calculateRoute();
            }
        });

        // Input Focus Handlers
        startInput.addEventListener('click', () => {
            currentStep = 'start';
            startInput.classList.add('active-step');
            endInput.classList.remove('active-step');
        });

        endInput.addEventListener('click', () => {
            currentStep = 'end';
            endInput.classList.add('active-step');
            startInput.classList.remove('active-step');
        });

        // Geolocation Logic
        const btnLocateMe = document.getElementById('btnLocateMe');
        const mapLocateBtn = document.getElementById('mapLocateBtn');

        function locateUser(setAsStart = false) {
            btnLocateMe.innerHTML = 'Locating...';
            mapLocateBtn.classList.add('loading');

            if (!navigator.geolocation) {
                alert("Geolocation is not supported by your browser");
                resetLocateButtons();
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const latlng = L.latLng(position.coords.latitude, position.coords.longitude);
                    
                    if (userMarker) map.removeLayer(userMarker);
                    userMarker = L.marker(latlng, { icon: userLocationIcon }).addTo(map);
                    
                    map.setView(latlng, 15);
                    resetLocateButtons();
                    mapLocateBtn.classList.add('active');

                    if (setAsStart) {
                        if (startMarker) map.removeLayer(startMarker);
                        startMarker = L.marker(latlng, { icon: startIcon, title: "Start" }).addTo(map);
                        startInput.value = "My Location";
                        
                        currentStep = 'end';
                        startInput.classList.remove('active-step');
                        endInput.classList.add('active-step');
                        
                        if (endMarker) calculateRoute();
                    }
                },
                (error) => {
                    console.error(error);
                    alert("Unable to retrieve your location. Please check browser permissions.");
                    resetLocateButtons();
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        function resetLocateButtons() {
            btnLocateMe.innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg> Use My Current Location';
            mapLocateBtn.classList.remove('loading');
        }

        btnLocateMe.addEventListener('click', () => locateUser(true));
        mapLocateBtn.addEventListener('click', () => locateUser(false));

        async function calculateRoute() {
            if (!startMarker || !endMarker) return;

            if (routeLayer) {
                map.removeLayer(routeLayer);
            }

            const start = `${startMarker.getLatLng().lng},${startMarker.getLatLng().lat}`;
            const end = `${endMarker.getLatLng().lng},${endMarker.getLatLng().lat}`;
            
            const url = `${ORS_BASE_URL}/directions/${currentProfile}?start=${start}&end=${end}`;

            try {
                const response = await fetch(url, {
                    headers: {
                        'Accept': 'application/json, application/geo+json'
                    }
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error.message || `API returned ${response.status}`);
                }

                const data = await response.json();
                
                // Draw route
                const coordinates = data.features[0].geometry.coordinates.map(coord => [coord[1], coord[0]]);
                routeLayer = L.polyline(coordinates, {
                    color: '#1a73e8',
                    weight: 5,
                    opacity: 0.9,
                    lineJoin: 'round'
                }).addTo(map);

                map.fitBounds(routeLayer.getBounds(), { padding: [50, 50] });

                // Update stats
                const summary = data.features[0].properties.segments[0];
                const distanceKm = (summary.distance / 1000).toFixed(1);
                const durationMins = Math.round(summary.duration / 60);

                document.getElementById('routeStats').style.display = 'block';
                document.getElementById('distValue').innerText = `${distanceKm} km distance`;
                
                if (durationMins < 60) {
                    document.getElementById('timeValue').innerText = `${durationMins} min`;
                } else {
                    const hrs = Math.floor(durationMins / 60);
                    const mins = durationMins % 60;
                    document.getElementById('timeValue').innerText = `${hrs} h ${mins} min`;
                }

            } catch (error) {
                console.error(error);
                alert(`Routing Error: ${error.message}\nMake sure both points are within the Limpopo road network.`);
            }
        }

        function resetMap() {
            if (startMarker) map.removeLayer(startMarker);
            if (endMarker) map.removeLayer(endMarker);
            if (routeLayer) map.removeLayer(routeLayer);
            if (userMarker) map.removeLayer(userMarker);
            
            startMarker = null;
            endMarker = null;
            
            startInput.value = '';
            endInput.value = '';
            
            currentStep = 'start';
            startInput.classList.add('active-step');
            endInput.classList.remove('active-step');

            document.getElementById('routeStats').style.display = 'none';
            mapLocateBtn.classList.remove('active');
            map.setView([-23.9045, 29.4689], 8);
        }
    </script>
</body>
</html>
